<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub - Your Game Collection</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <i class="fas fa-gamepad"></i>
            </div>
            <h1 class="title">GameHub</h1>
            <p class="subtitle">Your Game Collection Hub</p>
        </header>

        <!-- Add Game Form -->
        <div class="add-game-section">
            <button class="toggle-btn" id="toggleFormBtn"><i class="fas fa-plus"></i> Add New Game</button>
            
            <form class="add-game-form" id="addGameForm" style="display: none;">
                <input 
                    type="text" 
                    id="gameName" 
                    placeholder="Game Name" 
                    required
                    class="input-field"
                >
                
                <!-- Logo Upload Section -->
                <div class="upload-section">
                    <label for="gameLogo" class="upload-label">Game Logo (Image Upload)</label>
                    <input 
                        type="file" 
                        id="gameLogo" 
                        accept="image/*" 
                        class="file-input"
                        required
                    >
                    <small class="help-text">📸 Select a PNG, JPG, or GIF image (max 2MB)</small>
                    <div class="image-preview" id="imagePreview"></div>
                </div>

                <input 
                    type="text" 
                    id="gameDescription" 
                    placeholder="Game Description (optional)" 
                    class="input-field"
                >

                <input 
                    type="url" 
                    id="gameLink" 
                    placeholder="Game URL (deployed link - e.g., https://...)" 
                    required
                    class="input-field"
                >

                <select id="gameCategory" class="input-field multi-select" multiple required>
                    <option value="">🎮 Select Categories (One or More)</option>
                    <option value="Action">🎯 Action</option>
                    <option value="Adventure">🗺️ Adventure</option>
                    <option value="Puzzle">🧩 Puzzle</option>
                    <option value="Strategy">♟️ Strategy</option>
                    <option value="RPG">⚔️ RPG</option>
                    <option value="Sports">⚽ Sports</option>
                    <option value="Simulation">🎮 Simulation</option>
                    <option value="Racing">🏎️ Racing</option>
                    <option value="Casual">😊 Casual</option>
                    <option value="Arcade">🕹️ Arcade</option>
                    <option value="Educational">📚 Educational</option>
                    <option value="Horror">👻 Horror</option>
                    <option value="Other">❓ Other</option>
                </select>

                <button type="submit" class="submit-btn"><i class="fas fa-check"></i> Add Game</button>
                <button type="button" class="cancel-btn" id="cancelBtn"><i class="fas fa-times"></i> Cancel</button>
            </form>
        </div>

        <!-- Games Grid -->
        <div class="games-grid" id="gamesGrid">
            <!-- Games will be rendered here -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState">
            <p>No games yet! 🎯 Add your first game to get started.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
